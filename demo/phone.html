<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧監控系統 V0.11</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --danger: #ef4444;
            --cold: #3b82f6;
            --text: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* 縮放容器 */
        #scene {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* 主控制面板 */
        #main-panel {
            width: 340px; padding: 25px;
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transform-origin: center center;
            cursor: grab;
            user-select: none;
        }

        #main-panel:active { cursor: grabbing; }

        .ver-info { font-size: 11px; opacity: 0.5; margin-bottom: 15px; letter-spacing: 1px; }

        /* 溫度看板 */
        .temp-card {
            margin: 20px 0; padding: 20px;
            border-radius: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.03);
        }
        .temp-value { font-size: 56px; font-weight: 800; line-height: 1; }
        .temp-unit { font-size: 20px; vertical-align: top; margin-left: 4px; }
        .temp-hint { margin-top: 10px; font-weight: 600; font-size: 14px; height: 20px; }

        /* 錄音清單 */
        .track-container {
            margin-top: 25px; text-align: left;
        }
        .track-list {
            max-height: 160px; overflow-y: auto;
            margin-bottom: 15px; border-radius: 12px;
        }
        .track-item {
            background: rgba(255,255,255,0.06);
            padding: 10px; margin-bottom: 8px; border-radius: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .track-info { font-size: 12px; display: flex; justify-content: space-between; opacity: 0.7; }

        /* 通用按鈕 */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .btn-rec { background: var(--primary); color: #0f172a; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-stop { background: var(--danger); color: white; animation: pulse 1.5s infinite; }
        .btn-delete { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); margin-top: 20px; font-size: 13px; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        audio { width: 100%; height: 35px; filter: invert(1); opacity: 0.8; }
        
        /* 滾輪/拖曳提示 */
        .help-tip { font-size: 12px; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>

<div id="scene">
    <div id="main-panel">
        <div class="ver-info">DEVICE MONITOR V0.11</div>
        
        <div id="temp-display" class="temp-card">
            <div class="temp-value"><span id="temp-num">--</span><span class="temp-unit">°C</span></div>
            <div id="status-label" class="temp-hint">校準感測器中...</div>
        </div>

        <button id="recBtn" class="btn btn-rec">開始多軌錄音</button>
        
        <div class="track-container">
            <div class="track-list" id="trackList"></div>
        </div>

        <button id="clearAllBtn" class="btn btn-delete">清除本機所有資料</button>
        
        <div class="help-tip">
            PC: 滾輪縮放 / 左鍵拖曳<br>
            Mobile: 雙指縮放 / 單指拖曳
        </div>
    </div>
</div>

<script>
    // --- 初始化變數與資料庫 ---
    let db;
    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;
    let mediaRecorder, chunks = [];
    const panel = document.getElementById('main-panel');
    const trackList = document.getElementById('trackList');

    // IndexedDB 初始化 (儲存 Blob 錄音檔)
    const request = indexedDB.open("SensorDB_v011", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("audio_tracks", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        renderTracks();
    };

    // --- 溫度偵測模擬邏輯 ---
    function updateSensor() {
        // 模擬範圍 -10 到 70 度
        const temp = (Math.random() * 80 - 10).toFixed(1);
        const numDisp = document.getElementById('temp-num');
        const card = document.getElementById('temp-display');
        const label = document.getElementById('status-label');
        
        numDisp.innerText = temp;

        if (temp >= 50) {
            card.style.background = "rgba(239, 68, 68, 0.25)";
            card.style.boxShadow = "0 0 20px rgba(239, 68, 68, 0.4)";
            label.innerText = "🚨 系統警告：裝置過熱";
            label.style.color = "var(--danger)";
        } else if (temp <= 5) {
            card.style.background = "rgba(59, 130, 246, 0.25)";
            card.style.boxShadow = "0 0 20px rgba(59, 130, 246, 0.4)";
            label.innerText = "❄️ 系統提示：溫度過冷";
            label.style.color = "var(--cold)";
        } else {
            card.style.background = "rgba(255, 255, 255, 0.03)";
            card.style.boxShadow = "none";
            label.innerText = "運作狀態：正常";
            label.style.color = "var(--primary)";
        }
    }
    setInterval(updateSensor, 2500);
    updateSensor();

    // --- 互動引擎 (Hammer.js) ---
    const mc = new Hammer.Manager(document.body);
    const pan = new Hammer.Pan();
    const pinch = new Hammer.Pinch();
    mc.add([pan, pinch]);

    mc.on("panmove", e => {
        posX = lastPosX + e.deltaX;
        posY = lastPosY + e.deltaY;
        applyTransform();
    });
    mc.on("panend", () => {
        lastPosX = posX; lastPosY = posY;
    });

    mc.on("pinchmove", e => {
        scale = Math.max(0.4, Math.min(3, lastScale * e.scale));
        applyTransform();
    });
    mc.on("pinchend", () => {
        lastScale = scale;
    });

    // 電腦滾輪縮放支援
    window.addEventListener('wheel', e => {
        e.preventDefault();
        const zoomSpeed = 0.1;
        scale = e.deltaY < 0 ? scale + zoomSpeed : scale - zoomSpeed;
        scale = Math.max(0.4, Math.min(3, scale));
        lastScale = scale;
        applyTransform();
    }, { passive: false });

    function applyTransform() {
        panel.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // --- 錄音功能實作 ---
    const recBtn = document.getElementById('recBtn');
    recBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = saveRecording;
                mediaRecorder.start();
                recBtn.innerText = "停止並儲存軌道";
                recBtn.className = "btn btn-stop";
            } catch (err) { alert("無法存取麥克風"); }
        } else {
            mediaRecorder.stop();
            recBtn.innerText = "開始多軌錄音";
            recBtn.className = "btn btn-rec";
        }
    };

    function saveRecording() {
        const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
        const trans = db.transaction(["audio_tracks"], "readwrite");
        trans.objectStore("audio_tracks").add({
            data: blob,
            date: new Date().toLocaleTimeString()
        });
        trans.oncomplete = renderTracks;
    }

    function renderTracks() {
        trackList.innerHTML = '';
        const store = db.transaction("audio_tracks").objectStore("audio_tracks");
        store.openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const item = document.createElement('div');
                item.className = 'track-item';
                const url = URL.createObjectURL(cursor.value.data);
                item.innerHTML = `
                    <div class="track-info"><span>軌道 #${cursor.value.id}</span><span>${cursor.value.date}</span></div>
                    <audio controls src="${url}"></audio>
                `;
                trackList.prepend(item);
                cursor.continue();
            }
        };
    }

    // --- 清除資料 ---
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("確定要永久刪除本機所有錄音與緩存嗎？")) {
            const trans = db.transaction(["audio_tracks"], "readwrite");
            trans.objectStore("audio_tracks").clear();
            trans.oncomplete = () => {
                alert("資料已清空");
                location.reload();
            };
        }
    };
</script>

</body>
</html>
